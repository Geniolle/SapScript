<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAP Script Web</title>
  <link rel="stylesheet" href="/static/styles.css?v=3">
  <style>
    .container {
      width: 100% !important;
      max-width: none !important;
      padding: 32px 48px !important;
      box-sizing: border-box !important;
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="hero">
      <div>
        <p class="eyebrow">SAP Script</p>
        <h1>Cockpit SAP via Web</h1>
        <p class="subtitle">O botão web cria um pedido; o worker Windows executa o teu Cockpit no SAP GUI e devolve sempre o <code>STATUS</code> lido de <code>wnd[0]/sbar</code>.</p>
      </div>
      <div class="badge">Docker + Worker Windows</div>
    </header>

    <section class="grid">
      <form id="job-form" class="card">
        <h2>Novo pedido</h2>

        <label>
          Rotina
          <select name="task" required>
            <option value="sap_cockpit">Executar SAP Cockpit</option>
          </select>
        </label>

        <label>
          Ambiente
          <select name="ambiente">
            <option value="">Selecione o ambiente</option>
            {% for ambiente in ambientes %}
              <option value="{{ ambiente.codigo }}">
                {{ ambiente.label }}
              </option>
            {% endfor %}
          </select>
        </label>

        <label>
          Processo / pasta
          <select name="processo" id="processo-select">
            <option value="">Selecione o processo</option>
            {% for processo in processos %}
              <option value="{{ processo.nome }}">
                {{ processo.label }}
              </option>
            {% endfor %}
          </select>
        </label>

        <label>
          Subprocesso / ficheiro .py
          <select name="subprocesso" id="subprocesso-select">
            <option value="">Selecione primeiro o processo</option>
          </select>
        </label>

        <div class="field-block">
          <label for="caminho-ficheiro-input">
            Caminho do ficheiro
          </label>

          <div class="path-picker-control">
            <input
              name="caminho_ficheiro"
              id="caminho-ficheiro-input"
              class="path-input"
              placeholder="Selecionar ficheiro"
              autocomplete="off"
              readonly
            >

            <button
              type="button"
              id="select-excel-button"
              class="path-picker-icon-button"
              title="Selecionar ficheiro no browser"
              aria-label="Selecionar ficheiro no browser"
            >
              <span aria-hidden="true">□</span>
            </button>
          </div>

          <input
            type="file"
            id="browser-file-input"
            class="browser-file-input"
          >


          <div class="file-picker-actions compact-actions">
            <button type="button" id="clear-excel-button" class="secondary danger-light">
              Limpar caminho
            </button>
          </div>

          <div id="selected-file-box" class="selected-file-box muted">
            Nenhum ficheiro selecionado.
          </div>
        </div>

        <label>
          Opção de request
          <select name="request_option" id="request-option-select">
            <option value="4">Não transportar</option>
            <option value="1">Usar request existente</option>
            <option value="2">Criar nova request</option>
          </select>
        </label>

        <label id="request-number-field">
          Número da request
          <input name="request_number" id="request-number-input" placeholder="Ex.: S4QK900396">
        </label>

        <label id="request-desc-field">
          Descrição da nova request
          <input name="request_desc" id="request-desc-input" placeholder="Ex.: REQUEST CRIADA VIA WEB">
        </label>

        <label id="request-type-field">
          Tipo da nova request
          <select name="request_type" id="request-type-select">
            <option value="1">Customizing</option>
            <option value="2">Workbench</option>
          </select>
        </label>

        <button type="submit">Executar</button>
        <div id="worker-status-box" style="margin-top: 8px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px;">
          <span id="worker-status-indicator" style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc;"></span>
          <span id="worker-status-text" class="muted">A verificar worker...</span>
        </div>
        <p id="form-message" class="message"></p>
      </form>

      <section class="card">
        <div class="section-header" style="flex-wrap: wrap;">
          <div class="tabs">
            <button type="button" class="tab active" data-tab="running">Em execução</button>
            <button type="button" class="tab" data-tab="history">Histórico</button>
          </div>
          <button id="refresh-button" type="button" class="secondary">Atualizar</button>
        </div>
        <div id="jobs" class="jobs"></div>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY_EXCEL_PATH = 'sap_script_web_last_excel_path';

    const form = document.querySelector('#job-form');
    const formMessage = document.querySelector('#form-message');
    const jobsContainer = document.querySelector('#jobs');
    const refreshButton = document.querySelector('#refresh-button');

    const processoSelect = document.querySelector('#processo-select');
    const subprocessoSelect = document.querySelector('#subprocesso-select');

    const caminhoFicheiroInput = document.querySelector('#caminho-ficheiro-input');
    const selectedFileBox = document.querySelector('#selected-file-box');
    const selectExcelButton = document.querySelector('#select-excel-button');
    const browserFileInput = document.querySelector('#browser-file-input');
    const clearExcelButton = document.querySelector('#clear-excel-button');

    const requestOptionSelect = document.querySelector('#request-option-select');
    const requestNumberField = document.querySelector('#request-number-field');
    const requestDescField = document.querySelector('#request-desc-field');
    const requestTypeField = document.querySelector('#request-type-field');

    const requestNumberInput = document.querySelector('#request-number-input');
    const requestDescInput = document.querySelector('#request-desc-input');
    const requestTypeSelect = document.querySelector('#request-type-select');

    restoreLastExcelPath();
    updateRequestFieldsVisibility();

    processoSelect.addEventListener('change', async () => {
      await loadSubprocessos();
    });

    selectExcelButton.addEventListener('click', () => {
      browserFileInput.value = '';
      browserFileInput.click();
    });

    browserFileInput.addEventListener('change', async () => {
      await uploadFileFromBrowser();
    });

    clearExcelButton.addEventListener('click', () => {
      setExcelPath('');
      browserFileInput.value = '';
      formMessage.textContent = 'Caminho do ficheiro limpo.';
    });

    requestOptionSelect.addEventListener('change', () => {
      updateRequestFieldsVisibility();
    });

    function updateRequestFieldsVisibility() {
      const option = requestOptionSelect.value || '4';

      const isNaoTransportar = option === '4';
      const isUsarExistente = option === '1';
      const isCriarNova = option === '2';

      setFieldVisible(requestNumberField, requestNumberInput, isUsarExistente);
      setFieldVisible(requestDescField, requestDescInput, isCriarNova);
      setFieldVisible(requestTypeField, requestTypeSelect, isCriarNova);

      requestNumberInput.required = isUsarExistente;
      requestDescInput.required = false;
      requestTypeSelect.required = isCriarNova;

      if (isNaoTransportar) {
        requestNumberInput.value = '';
        requestDescInput.value = '';
        requestTypeSelect.value = '1';
      }

      if (isUsarExistente) {
        requestDescInput.value = '';
        requestTypeSelect.value = '1';
      }

      if (isCriarNova) {
        requestNumberInput.value = '';
      }
    }

    function setFieldVisible(fieldElement, inputElement, visible) {
      if (visible) {
        fieldElement.hidden = false;
        fieldElement.classList.remove('request-field-hidden');
        fieldElement.style.display = '';
        inputElement.disabled = false;
      }
      else {
        fieldElement.hidden = true;
        fieldElement.classList.add('request-field-hidden');
        fieldElement.style.display = 'none';
        inputElement.disabled = true;
      }
    }

    function restoreLastExcelPath() {
      const savedPath = localStorage.getItem(STORAGE_KEY_EXCEL_PATH) || '';
      setExcelPath(savedPath, false);
    }

    function setExcelPath(path, persist = true) {
      const cleanPath = String(path || '').trim();

      caminhoFicheiroInput.value = cleanPath;
      caminhoFicheiroInput.title = cleanPath;

      if (cleanPath) {
        selectedFileBox.classList.remove('muted');
        selectedFileBox.innerHTML = `<b>Selecionado:</b><br>${escapeHtml(cleanPath)}`;

        if (persist) {
          localStorage.setItem(STORAGE_KEY_EXCEL_PATH, cleanPath);
        }
      }
      else {
        selectedFileBox.classList.add('muted');
        selectedFileBox.textContent = 'Nenhum ficheiro selecionado.';

        if (persist) {
          localStorage.removeItem(STORAGE_KEY_EXCEL_PATH);
        }
      }
    }


    async function uploadFileFromBrowser() {
      const file = browserFileInput.files && browserFileInput.files[0];

      if (!file) {
        return;
      }

      formMessage.textContent = 'A enviar ficheiro para o projeto...';
      selectExcelButton.disabled = true;
      clearExcelButton.disabled = true;

      try {
        const payload = new FormData();
        payload.append('file', file);

        const response = await fetch('/api/upload-file', {
          method: 'POST',
          body: payload
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Erro ao enviar ficheiro: ${errorText}`);
        }

        const data = await response.json();
        const windowsPath = String(data.windows_path || '').trim();

        if (!windowsPath) {
          throw new Error('Upload concluído, mas o backend não devolveu caminho Windows.');
        }

        setExcelPath(windowsPath);
        formMessage.textContent = 'Ficheiro selecionado e guardado no projeto.';
      }
      catch (error) {
        formMessage.textContent = error.message || 'Erro ao selecionar ficheiro no browser.';
      }
      finally {
        selectExcelButton.disabled = false;
        clearExcelButton.disabled = false;
      }
    }

    async function selectExcelFileOnWindows() {
      formMessage.textContent = 'A abrir janela de seleção no Windows...';
      selectExcelButton.disabled = true;
      clearExcelButton.disabled = true;

      try {
        const payload = new FormData();
        payload.append('task', 'select_excel_file');
        payload.append('ambiente', '');
        payload.append('processo', processoSelect.value || '');
        payload.append('subprocesso', subprocessoSelect.value || '');
        payload.append('request_option', '4');
        payload.append('request_number', '');
        payload.append('request_desc', '');
        payload.append('request_type', '1');
        payload.append('caminho_ficheiro', caminhoFicheiroInput.value || '');

        const response = await fetch('/jobs', {
          method: 'POST',
          body: payload
        });

        if (!response.ok) {
          formMessage.textContent = 'Erro ao pedir abertura da janela no Windows.';
          return;
        }

        const job = await response.json();
        const selectedPath = await waitForJobResult(job.id, 180000);

        setExcelPath(selectedPath);
        formMessage.textContent = 'Ficheiro selecionado com sucesso.';

        await loadJobs();
      }
      catch (error) {
        formMessage.textContent = error.message || 'Erro ao selecionar ficheiro no Windows.';
      }
      finally {
        selectExcelButton.disabled = false;
        clearExcelButton.disabled = false;
      }
    }

    async function waitForJobResult(jobId, timeoutMs) {
      const startedAt = Date.now();

      while (Date.now() - startedAt <= timeoutMs) {
        const response = await fetch(`/api/jobs/${encodeURIComponent(jobId)}`);

        if (!response.ok) {
          throw new Error('Não foi possível consultar a seleção de ficheiro.');
        }

        const job = await response.json();

        if (job.state === 'succeeded') {
          const selectedPath = String(job.status || '').trim();

          if (!selectedPath) {
            throw new Error('O worker concluiu, mas não devolveu caminho de ficheiro.');
          }

          return selectedPath;
        }

        if (job.state === 'failed') {
          const message = job.status || job.log || 'Seleção de ficheiro cancelada ou falhou no worker.';
          throw new Error(message);
        }

        await sleep(1000);
      }

      throw new Error('Tempo esgotado. Confirme se o worker Windows está ligado.');
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function loadSubprocessos() {
      const processo = processoSelect.value || '';

      subprocessoSelect.innerHTML = '';

      if (!processo) {
        addSubprocessoOption('', 'Selecione primeiro o processo');
        return;
      }

      addSubprocessoOption('', 'A carregar subprocessos...');

      try {
        const response = await fetch(`/api/subprocesses?processo=${encodeURIComponent(processo)}`);

        if (!response.ok) {
          subprocessoSelect.innerHTML = '';
          addSubprocessoOption('', 'Erro ao carregar subprocessos');
          return;
        }

        const data = await response.json();
        const subprocessos = data.subprocesses || [];

        subprocessoSelect.innerHTML = '';

        if (!subprocessos.length) {
          addSubprocessoOption('', 'Nenhum subprocesso .py encontrado');
          return;
        }

        addSubprocessoOption('', 'Selecione o subprocesso');

        for (const subprocesso of subprocessos) {
          addSubprocessoOption(subprocesso.nome, subprocesso.label);
        }
      }
      catch {
        subprocessoSelect.innerHTML = '';
        addSubprocessoOption('', 'Erro ao carregar subprocessos');
      }
    }

    function addSubprocessoOption(value, text) {
      const option = document.createElement('option');
      option.value = value;
      option.textContent = text;
      subprocessoSelect.appendChild(option);
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      formMessage.textContent = 'A criar pedido...';

      updateRequestFieldsVisibility();

      const task = form.querySelector('select[name="task"]').value;
      const processo = form.querySelector('select[name="processo"]').value;
      const subprocesso = form.querySelector('select[name="subprocesso"]').value;
      const requestOption = requestOptionSelect.value || '4';

      if (task === 'sap_cockpit' && (!processo || !subprocesso)) {
        formMessage.textContent = 'Para Executar SAP Cockpit, selecione Processo e Subprocesso.';
        return;
      }

      if (requestOption === '1' && !requestNumberInput.value.trim()) {
        formMessage.textContent = 'Para usar request existente, preencha o Número da request.';
        requestNumberInput.focus();
        return;
      }

      const response = await fetch('/jobs', {
        method: 'POST',
        body: new FormData(form)
      });

      if (!response.ok) {
        formMessage.textContent = 'Erro ao criar pedido.';
        return;
      }

      const job = await response.json();
      formMessage.textContent = 'Pedido adicionado à fila com sucesso!';
      setTimeout(() => {
        if (formMessage.textContent === 'Pedido adicionado à fila com sucesso!') {
          formMessage.textContent = '';
        }
      }, 3000);
      await loadJobs();
    });

    refreshButton.addEventListener('click', loadJobs);

    let allJobs = [];
    let currentTab = 'running';

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        currentTab = e.target.dataset.tab;
        renderJobs();
      });
    });

    async function loadJobs() {
      try {
        const [jobsResponse, statusResponse] = await Promise.all([
          fetch('/api/jobs?limit=50'),
          fetch('/api/worker/status')
        ]);
        
        if (jobsResponse.ok) {
          const data = await jobsResponse.json();
          allJobs = data.jobs || [];
          renderJobs();
        }

        if (statusResponse.ok) {
          const statusData = await statusResponse.json();
          const indicator = document.querySelector('#worker-status-indicator');
          const text = document.querySelector('#worker-status-text');
          
          if (statusData.status === 'online') {
            indicator.style.background = '#22c55e'; // green
            text.textContent = 'Worker Online';
            text.style.color = '#166534';
          } else {
            indicator.style.background = '#ef4444'; // red
            text.textContent = 'Worker Offline';
            text.style.color = '#991b1b';
          }
        }
      } catch (err) {
        console.error("Erro ao carregar dados:", err);
      }
    }

    function renderJobs() {
      jobsContainer.innerHTML = '';

      const now = new Date();
      const filteredJobs = allJobs.filter(job => {
        const isCompleted = job.state === 'succeeded' || job.state === 'failed';
        let isRecent = false;
        
        if (isCompleted) {
           const updatedDate = new Date(job.updated_at);
           const diffHours = (now - updatedDate) / (1000 * 60 * 60);
           isRecent = diffHours < 24;
        } else {
           isRecent = true; // pending or running
        }

        const isRunningTab = !job.is_archived && isRecent;
        return currentTab === 'running' ? isRunningTab : !isRunningTab;
      });

      if (!filteredJobs.length) {
        jobsContainer.innerHTML = '<p class="muted">Ainda não existem pedidos nesta aba.</p>';
        return;
      }

      for (const job of filteredJobs) {
        const article = document.createElement('article');
        article.className = `job ${job.state}`;
        
        let actionsHtml = '';
        if (job.state === 'running' || job.state === 'pending') {
          actionsHtml = `
            <button type="button" class="copy-log-btn secondary" style="padding: 4px 8px; font-size: 12px; height: auto;" data-id="${escapeHtml(job.id)}">Copiar Log</button>
            <button type="button" class="cancel-job-btn danger-light secondary" style="padding: 4px 8px; font-size: 12px; height: auto;" data-id="${escapeHtml(job.id)}">Cancelar</button>
          `;
        } else if (currentTab === 'running') {
          actionsHtml = `
            <button type="button" class="copy-log-btn secondary" style="padding: 4px 8px; font-size: 12px; height: auto;" data-id="${escapeHtml(job.id)}">Copiar Log</button>
            <button type="button" class="archive-job-btn secondary" style="padding: 4px 8px; font-size: 12px; height: auto; background-color: #e5e7eb; color: #374151; border-color: #d1d5db;" data-id="${escapeHtml(job.id)}">Arquivar</button>
          `;
        } else {
          actionsHtml = `
            <button type="button" class="copy-log-btn secondary" style="padding: 4px 8px; font-size: 12px; height: auto;" data-id="${escapeHtml(job.id)}">Copiar Log</button>
          `;
        }

        let logHtml = '';
        if (job.state === 'running' || job.state === 'pending') {
          const lines = (job.log || '').split('\\n').filter(l => l.trim() !== '');
          let parsedLines = lines.map(line => {
            if (line.startsWith('[INFO]')) return `<div class="log-line"><span class="log-badge info">INFO</span> ${escapeHtml(line.substring(6).trim())}</div>`;
            if (line.startsWith('[OK]')) return `<div class="log-line"><span class="log-badge ok">OK</span> ${escapeHtml(line.substring(4).trim())}</div>`;
            if (line.startsWith('[WARN]')) return `<div class="log-line"><span class="log-badge warn">WARN</span> ${escapeHtml(line.substring(6).trim())}</div>`;
            if (line.startsWith('[ERRO]')) return `<div class="log-line"><span class="log-badge erro">ERRO</span> ${escapeHtml(line.substring(6).trim())}</div>`;
            if (line.startsWith('---') && line.endsWith('---')) return `<div class="log-step">${escapeHtml(line.replaceAll('-', '').trim())}</div>`;
            return `<div class="log-line">${escapeHtml(line)}</div>`;
          }).join('');
          
          logHtml = `
            <div class="modern-terminal">
              <div class="modern-terminal-header">
                <div class="term-dot red"></div>
                <div class="term-dot yellow"></div>
                <div class="term-dot green"></div>
              </div>
              <div class="modern-terminal-body">
                ${parsedLines}
                <div class="log-line" style="margin-top: 8px; color: #8b949e;">> a processar<span class="cursor-blink"></span></div>
              </div>
            </div>
          `;
        } else {
          logHtml = `
            <details>
              <summary>Detalhes</summary>
              <pre>${escapeHtml(JSON.stringify(job.params, null, 2))}\\n\\n${escapeHtml(job.log || '')}</pre>
            </details>
          `;
        }

        article.innerHTML = `
          <div class="job-top">
            <strong>${escapeHtml(job.task)}</strong>
            <div style="display: flex; gap: 8px; align-items: center;">
              ${actionsHtml}
              <span>${escapeHtml(job.state)}</span>
            </div>
          </div>
          <p><b>STATUS:</b> ${escapeHtml(job.status || '')}</p>
          ${logHtml}
          <small>${escapeHtml(formatTime(job.created_at))}${job.worker_name ? ' · Executado por: ' + escapeHtml(job.worker_name) : ''}</small>
        `;
        jobsContainer.appendChild(article);
      }

      document.querySelectorAll('.cancel-job-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const jobId = e.target.dataset.id;
          if (!confirm('Tem a certeza que deseja cancelar este pedido?')) return;
          
          e.target.disabled = true;
          e.target.textContent = 'A cancelar...';
          
          try {
            const response = await fetch(`/api/jobs/${encodeURIComponent(jobId)}/cancel`, {
              method: 'POST'
            });
            if (response.ok) {
              await loadJobs();
            } else {
              alert('Falha ao cancelar o pedido.');
              e.target.disabled = false;
              e.target.textContent = 'Cancelar';
            }
          } catch (err) {
            alert('Erro: ' + err.message);
            e.target.disabled = false;
            e.target.textContent = 'Cancelar';
          }
        });
      });

      document.querySelectorAll('.archive-job-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const jobId = e.target.dataset.id;
          
          e.target.disabled = true;
          e.target.textContent = 'A arquivar...';
          
          try {
            const response = await fetch(`/api/jobs/${encodeURIComponent(jobId)}/archive`, {
              method: 'POST'
            });
            if (response.ok) {
              await loadJobs();
            } else {
              alert('Falha ao arquivar o pedido.');
              e.target.disabled = false;
              e.target.textContent = 'Arquivar';
            }
          } catch (err) {
            alert('Erro: ' + err.message);
            e.target.disabled = false;
            e.target.textContent = 'Arquivar';
          }
        });
      });

      document.querySelectorAll('.copy-log-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const jobId = e.target.dataset.id;
          const job = allJobs.find(j => j.id === jobId);
          if (job) {
            navigator.clipboard.writeText(job.log || '').then(() => {
              const originalText = e.target.textContent;
              e.target.textContent = 'Copiado!';
              setTimeout(() => e.target.textContent = originalText, 2000);
            }).catch(err => alert('Erro ao copiar log.'));
          }
        });
      });
    }

    function formatTime(isoStr) {
      if (!isoStr) return '';
      try {
        const d = new Date(isoStr);
        if (isNaN(d.getTime())) return isoStr;
        return d.toLocaleString('pt-PT', { timeZone: 'Europe/Lisbon' });
      } catch(e) {
        return isoStr;
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    loadJobs();
    setInterval(loadJobs, 3000);
  </script>

<script>
(function () {
  function forceNormalFieldFontWeight() {
    const selectors = [
      '#job-form input',
      '#job-form select',
      '#job-form textarea',
      '#job-form option',
      '#job-form optgroup',
      '#job-form .path-input'
    ];

    document.querySelectorAll(selectors.join(',')).forEach((element) => {
      element.style.setProperty('font-weight', '400', 'important');
      element.style.setProperty('font-variation-settings', '"wght" 400', 'important');
    });

    document.querySelectorAll('#job-form label, #job-form .field-block > label').forEach((element) => {
      element.style.setProperty('font-weight', '700', 'important');
    });
  }
